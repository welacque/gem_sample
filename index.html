  <style>

    .tab-btn[aria-selected="true"] { background: var(--ink); border-color: var(--ink); color: #fff; box-shadow: 0 8px 18px rgba(47,42,38,.18); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin: 16px 0; }
    .panel.soft { background: rgba(255,255,255,.72); box-shadow: none; }

    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(78,52,33,.08); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.secondary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    .btn.dark { background: var(--ink); border-color: var(--ink); color: #fff; }
    .btn.purple { background: var(--accent-3); border-color: var(--accent-3); color: #fff; }
    .btn.danger { background: #fff4ef; border-color: #efc4ae; color: #a74824; }
    .btn.small { padding: 7px 11px; font-size: .88rem; }
    .notice { border-radius: 16px; border: 1px solid #ecd8be; background: #fff8ed; padding: 14px 16px; color: #6e4c29; }
    .notice.green { border-color: #cfe3d8; background: #f2fbf6; color: #335d49; }
    .notice.purple { border-color: #dbd0ea; background: #f8f4ff; color: #574274; }
    .muted { color: var(--muted); }
    .small { font-size: .9rem; } .tiny { font-size: .78rem; }
    .divider { height: 1px; background: var(--line); margin: 18px 0; }
    .progress-wrap { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .progress-pill { border: 1px solid var(--line); background: #fffdfb; border-radius: 999px; padding: 8px 12px; font-weight: 850; white-space: nowrap; }
    .progress-bar { flex: 1 1 180px; min-width: 160px; height: 12px; border-radius: 999px; background: #efe4da; overflow: hidden; }
    .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width .2s ease; }
    .section-head { display: flex; gap: 10px; align-items: center; justify-content: space-between; margin: 28px 0 10px; scroll-margin-top: 90px; }
    .section-head h3 { margin: 0; }
    .group-head { display: flex; gap: 10px; align-items: center; margin: 20px 0 10px; }
    .group-head h4 { margin: 0; font-size: 1.08rem; }
    .section-chip, .group-chip { display: inline-flex; align-items: center; gap: 6px; background: #fff2e8; color: #9b552f; border: 1px solid #f0d6c3; padding: 6px 10px; border-radius: 999px; font-weight: 850; font-size: .86rem; }
    .group-chip { background: #f3fbf6; color: #426f5d; border-color: #d7e8df; }
    .person-tools { position: sticky; top: 76px; z-index: 20; background: rgba(255,248,241,.88); backdrop-filter: blur(10px); border: 1px solid rgba(234, 223, 211, .75); border-radius: 18px; padding: 12px; margin: 12px 0; }
    .jump-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .jump-row a { text-decoration:none; }
    .question-card { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 18px; padding: 16px; margin: 12px 0; scroll-margin-top: 160px; }
    .question-card.oldways { background: linear-gradient(135deg, #fffdfb, #fff8ef); border-color: #efd5ba; }
    .question-card header { display: flex; gap: 12px; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .question-card h4 { margin: 0; font-size: 1.05rem; }
    .question-card p { margin: 4px 0 0; color: var(--muted); font-size: .92rem; }
    .q-tag { flex: 0 0 auto; font-weight: 850; color: #7d5c3d; background: #fff4e8; border: 1px solid #f0dcc9; border-radius: 999px; padding: 5px 8px; font-size: .75rem; }
    .old-note { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0 12px; }

    .old-note strong { display:block; margin-bottom: 4px; color: #7a5131; }

    .scale-choice, .check-choice { position: relative; display: block; }

    .scale-box { min-height: 72px; border: 1px solid var(--line); border-radius: 14px; background: #fff; color: var(--ink); padding: 9px 8px; text-align: left; font-weight: 800; font-size: .86rem; line-height: 1.35; transition: .15s ease; }
    .scale-choice:hover .scale-box { border-color: rgba(215,121,69,.65); transform: translateY(-1px); }
    .scale-choice input:checked + .scale-box { background: #2f2a26; color: #fff; border-color: #2f2a26; box-shadow: 0 10px 22px rgba(47,42,38,.14); }
    .choice-index { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 999px; background: rgba(215,121,69,.12); color: var(--accent); font-size: .78rem; margin-right: 5px; }
    .scale-choice input:checked + .scale-box .choice-index { background: rgba(255,255,255,.18); color: #fff; }
    .specific-wrap { margin-top: 12px; }
    .specific-title { font-weight: 900; color: var(--muted); margin-bottom: 8px; }
    .check-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .check-box { min-height: 46px; border: 1px solid var(--line); border-radius: 12px; background: #fff; padding: 8px 10px 8px 34px; line-height:1.4; font-size:.9rem; position:relative; }
    .check-box::before { content: ''; position: absolute; left: 11px; top: 12px; width: 15px; height: 15px; border: 2px solid #ceb9a6; border-radius: 4px; background:#fff; }
    .check-choice input:checked + .check-box { border-color: var(--accent-3); background: #f9f4ff; color: #4e396f; font-weight: 800; }
    .check-choice input:checked + .check-box::before { background: var(--accent-3); border-color: var(--accent-3); box-shadow: inset 0 0 0 3px #fff; }
    .q-bottom { display: grid; grid-template-columns: 210px minmax(0, 1fr); gap: 10px; align-items: start; margin-top: 12px; }
    .custom-choice-row { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; margin-top: 8px; }
    .custom-list { display:flex; flex-wrap:wrap; gap: 6px; margin-top: 8px; }
    .mini-chip { display:inline-flex; align-items:center; gap:5px; border:1px solid var(--line); background:#fff; border-radius:999px; padding:5px 8px; font-size:.82rem; font-weight:800; }
    .mini-chip button { border:0; background:transparent; color:#a74824; padding:0; font-weight:900; }
    .values-grid { display: flex; flex-wrap: wrap; gap: 9px; }
    .value-chip { border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 999px; padding: 8px 12px; font-weight: 850; }
    .value-chip.selected { background: var(--accent-3); border-color: var(--accent-3); color: #fff; }
    .summary-cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric-card { border: 1px solid var(--line); border-radius: 16px; background: #fffdfb; padding: 14px; }
    .metric-card .num { font-size: 1.8rem; font-weight: 950; line-height: 1; margin: 4px 0; }
    .metric-card .label { font-weight: 850; color: var(--muted); font-size: .86rem; }
    .type-card { border-radius: 18px; padding: 16px; border: 1px solid #e3d7c9; background: linear-gradient(135deg, #fffdfb, #fff1e7); }
    .type-card h3 { margin: 0 0 6px; }
    .bars { display: grid; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 170px minmax(0,1fr) 110px; gap: 10px; align-items: center; }
    .bar-bg { height: 12px; background: #efe4da; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: .86rem; background: #fff9f4; position: sticky; top: 71px; z-index: 5; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
    .status { display: inline-flex; align-items: center; justify-content: center; border-radius: 999px; padding: 5px 8px; font-size: .78rem; font-weight: 900; white-space: nowrap; }

    .footer-note { text-align: center; color: var(--muted); margin: 32px 0 12px; font-size: .86rem; }

    }
  </style>
</head>

    function allQuestions() {
      return [...BASE_QUESTIONS, ...(state.customQuestions || [])];
    }
    function questionById(id) { return allQuestions().find(q => q.id === id); }
    function defaultAnswer() { return { scale: '', priority: '0', choices: [], customChoices: [], note: '' }; }
    function getAns(person, qid) {
      if (!state.people[person].answers[qid]) state.people[person].answers[qid] = defaultAnswer();
      const ans = state.people[person].answers[qid];
      if (!Array.isArray(ans.choices)) ans.choices = [];
      if (!Array.isArray(ans.customChoices)) ans.customChoices = [];
      if (ans.priority == null) ans.priority = '0';
      return ans;
    }
    function answered(ans) { return !!(ans.scale || Number(ans.priority) > 0 || (ans.choices||[]).length || (ans.customChoices||[]).length || (ans.note||'').trim()); }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return emptyState();
        const parsed = JSON.parse(raw);
        const base = emptyState();
        return { ...base, ...parsed, meta: {...base.meta, ...(parsed.meta||{})}, people: {...base.people, ...(parsed.people||{})}, customQuestions: parsed.customQuestions || [] };
      } catch (e) {
        console.warn(e); return emptyState();
      }
    }
    function saveState() {
      state.savedAt = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      updateProgressPills();
    }
    function toast(msg) {
      const el = $('#toast'); el.textContent = msg; el.classList.add('show');
      clearTimeout(toast._t); toast._t = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function renderAll() {
      renderStart(); renderPerson('a'); renderPerson('b'); renderReport(); renderGuide();

    function countsForPerson(person) {
      const qs = allQuestions();
      const done = qs.filter(q => answered(getAns(person, q.id))).length;
      return { done, total: qs.length, pct: qs.length ? Math.round(done / qs.length * 100) : 0 };
    }
    function updateProgressPills() {
      ['a','b'].forEach(p => {
        const c = countsForPerson(p);
        $$(`[data-progress-person="${p}"]`).forEach(el => el.textContent = `${c.done}/${c.total}（${c.pct}%）`);
        $$(`[data-progress-bar="${p}"]`).forEach(el => el.style.width = c.pct + '%');
      });
    }

    function renderCustomQuestionList() {

    function personName(person) { return state.people[person].displayName || state.people[person].label || (person === 'a' ? '回答A' : '回答B'); }
    function renderPerson(person) {

        </section>

            <div class="field"><label>操作</label><div class="btn-row"><button class="btn small" data-action="download-${person}-json">この回答だけJSON</button><button class="btn small" data-action="copy-person-text" data-person="${person}">回答テキストコピー</button></div></div>
          </div>
          <div class="jump-row">${Object.entries(SECTION_META).map(([k,m]) => `<a class="btn small" href="#${person}-${k}">${m.icon} ${m.short}</a>`).join('')}</div>
        </div>
        ${Object.entries(grouped).map(([section, groups]) => renderQuestionSection(person, section, groups)).join('')}

    function groupQuestions(qs) {
      const out = {};
      Object.keys(SECTION_META).forEach(k => out[k] = {});
      qs.forEach(q => {
        if (!out[q.section]) out[q.section] = {};
        if (!out[q.section][q.group]) out[q.section][q.group] = [];
        out[q.section][q.group].push(q);
      });
      return out;
    }
    function renderQuestionSection(person, section, groups) {
      const meta = SECTION_META[section] || {label: section, icon:'', short:section};
      const total = Object.values(groups).flat().length;
      if (!total) return '';
      return `
        <div class="section-head" id="${person}-${section}"><h3>${meta.icon} ${esc(meta.label)}</h3><span class="section-chip">${total}項目</span></div>
        ${Object.entries(groups).map(([group, items]) => `
          <div class="group-head"><span class="group-chip">${esc(group)}</span><span class="muted small">${items.length}項目</span></div>
          ${items.map(q => renderQuestionCard(person, q)).join('')}
        `).join('')}`;
    }
    function renderQuestionCard(person, q) {

      const oldHtml = isOld ? `<div class="old-note"><div><strong>昔あるある</strong>${esc(q.oldPractice)}</div><div><strong>今の目安・夫婦で確認したい点</strong>${esc(q.currentNote)}${sourceHtml}</div></div>` : '';
      return `
        <article class="question-card ${isOld ? 'oldways' : ''}" data-card-person="${person}" data-search="${esc((q.section+' '+q.group+' '+q.title+' '+q.prompt+' '+(q.oldPractice||'')+' '+(q.currentNote||'')+' '+q.choices.join(' ')).toLowerCase())}">
          <header>
            <div><h4>${esc(q.title)}</h4><p>${esc(q.prompt)}</p></div>
            <span class="q-tag">${esc(SECTION_META[q.section]?.short || q.section)}</span>
          </header>
          ${oldHtml}
          <div class="specific-title">大枠のこだわりレベル</div>
          <div class="scale-grid">
            ${scale.map((opt, i) => `
              <label class="scale-choice">
                <input type="radio" name="${person}-${q.id}-scale" data-answer="scale" data-person="${person}" data-qid="${esc(q.id)}" value="${i+1}" ${String(ans.scale) === String(i+1) ? 'checked' : ''} />
                <span class="scale-box"><span class="choice-index">${i+1}</span>${esc(opt)}</span>
              </label>`).join('')}
          </div>
          <div class="q-bottom">
            <div class="field"><label>${priorityLabel}</label><select data-answer="priority" data-person="${person}" data-qid="${esc(q.id)}">${PRIORITY.map(p => `<option value="${p.value}" ${String(ans.priority)===String(p.value) ? 'selected' : ''}>${esc(p.label)}</option>`).join('')}</select></div>
            <div class="field"><label>自由記述</label><textarea class="note-input" data-answer="note" data-person="${person}" data-qid="${esc(q.id)}" placeholder="例：これは絶対NG、ここは相手に任せたい、親に伝える時はこう言いたい等">${esc(ans.note)}</textarea></div>
          </div>
          <div class="specific-wrap">
            <div class="specific-title">具体的にどうしたい？（複数選択可）</div>
            <div class="check-grid">
              ${q.choices.map(choice => `
                <label class="check-choice">
                  <input type="checkbox" data-answer="choice" data-person="${person}" data-qid="${esc(q.id)}" value="${esc(choice)}" ${(ans.choices||[]).includes(choice) ? 'checked' : ''} />
                  <span class="check-box">${esc(choice)}</span>
                </label>`).join('')}
            </div>
            <div class="custom-choice-row">
              <input type="text" data-custom-choice-input="${person}|${esc(q.id)}" placeholder="選択肢にない希望を追加" />
              <button class="btn small" data-action="add-custom-choice" data-person="${person}" data-qid="${esc(q.id)}">追加</button>
            </div>
            <div class="custom-list">
              ${(ans.customChoices||[]).map((choice, idx) => `<span class="mini-chip">${esc(choice)} <button title="削除" data-action="delete-custom-choice" data-person="${person}" data-qid="${esc(q.id)}" data-idx="${idx}">×</button></span>`).join('')}
            </div>
          </div>
        </article>`;
    }

    function renderReport() {
      const metrics = buildMetrics();
      const top = metrics.rows.filter(r => r.bothAnswered).sort((a,b) => b.score - a.score).slice(0, 20);
      const oldTop = metrics.rows.filter(r => r.question.kind === 'oldways' && (r.maxPriority >= 3 || r.priorityDiff >= 2 || r.score >= 3)).sort((a,b) => b.score - a.score).slice(0, 30);
      const agree = metrics.rows.filter(r => r.bothAnswered && r.scaleDiff === 0 && r.sharedChoices.length > 0).sort((a,b)=>b.sharedChoices.length-a.sharedChoices.length).slice(0, 10);
      const cA = countsForPerson('a'), cB = countsForPerson('b');
      $('#tab-report').innerHTML = `
        <section class="panel">
          <h2>夫婦比較レポート</h2>
          <div class="summary-cards">
            <div class="metric-card"><div class="label">回答A進捗</div><div class="num">${cA.pct}%</div><div class="tiny muted">${cA.done}/${cA.total}項目</div></div>
            <div class="metric-card"><div class="label">回答B進捗</div><div class="num">${cB.pct}%</div><div class="tiny muted">${cB.done}/${cB.total}項目</div></div>
            <div class="metric-card"><div class="label">要相談項目</div><div class="num">${metrics.needTalk}</div><div class="tiny muted">差分または高重要度</div></div>
            <div class="metric-card"><div class="label">ルール化候補</div><div class="num">${metrics.ruleCandidates}</div><div class="tiny muted">最重要・NGあり</div></div>
          </div>
          ${renderTypeSummary(metrics)}
        </section>

        <section class="panel">
          <h2>大局的な相違</h2>
          <p class="muted small">スコアは「大枠のこだわりレベル差」「重要度/気にする度の差」「具体選択肢の違い」を合わせた目安です。数字が高いほど先に話す価値があります。</p>
          <div class="bars">${metrics.sectionScores.map(s => `<div class="bar-row"><strong>${esc(SECTION_META[s.section]?.short || s.section)}</strong><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100, Math.round(s.score*12))}%"></div></div><span class="tiny muted">${s.score.toFixed(1)} / ${s.count}項目</span></div>`).join('')}</div>
        </section>

        <section class="panel">
          <h2>優先して話すべき項目 Top20</h2>
          ${renderComparisonTable(top)}
        </section>

        <section class="panel">
          <h2>昔とは違う育児：気にする度・相違点</h2>
          <p class="muted small">両家の親向けしおりに入れる候補です。安全・医療・食事・交通まわりは、夫婦の温度差が小さくても高重要度なら明記候補にできます。</p>
          ${renderComparisonTable(oldTop.length ? oldTop : metrics.rows.filter(r => r.question.kind === 'oldways').slice(0, 12))}
        </section>

        <section class="panel">
          <h2>一致している強み</h2>
          ${agree.length ? renderAgreementList(agree) : '<p class="muted">まだ一致項目が少ないか、回答が不足しています。</p>'}
        </section>

        <section class="panel">
          <h2>詳細一覧</h2>
          <div class="btn-row no-print" style="margin-bottom:10px;"><button class="btn secondary" data-action="download-csv">CSVを書き出し</button><button class="btn" data-action="copy-report-text">レポート要約をコピー</button></div>
          ${renderComparisonTable(metrics.rows)}
        </section>`;
    }

    function buildMetrics() {
      const rows = allQuestions().map(q => compareQuestion(q));
      const needTalk = rows.filter(r => r.bothAnswered && (r.score >= 4 || r.scaleDiff >= 2 || r.priorityDiff >= 2 || r.choiceMismatch >= 0.7 || r.maxPriority >= 4)).length;
      const ruleCandidates = rows.filter(r => r.maxPriority >= 4 || (r.question.kind === 'oldways' && r.maxPriority >= 3)).length;
      const sectionScores = Object.keys(SECTION_META).map(section => {
        const items = rows.filter(r => r.question.section === section && r.eitherAnswered);
        const score = items.length ? items.reduce((a,b)=>a+b.score,0)/items.length : 0;
        return { section, score, count: items.length };
      });
      return { rows, needTalk, ruleCandidates, sectionScores };
    }
    function compareQuestion(q) {
      const a = getAns('a', q.id), b = getAns('b', q.id);
      const aScale = Number(a.scale || 0), bScale = Number(b.scale || 0);
      const aPri = Number(a.priority || 0), bPri = Number(b.priority || 0);
      const aAll = unique([...(a.choices||[]), ...(a.customChoices||[])]);
      const bAll = unique([...(b.choices||[]), ...(b.customChoices||[])]);
      const shared = aAll.filter(x => bAll.includes(x));
      const union = unique([...aAll, ...bAll]);
      const onlyA = aAll.filter(x => !bAll.includes(x));
      const onlyB = bAll.filter(x => !aAll.includes(x));
      const bothAnswered = answered(a) && answered(b);
      const eitherAnswered = answered(a) || answered(b);
      const scaleDiff = (aScale && bScale) ? Math.abs(aScale - bScale) : 0;
      const priorityDiff = (aPri && bPri) ? Math.abs(aPri - bPri) : 0;
      const choiceMismatch = union.length ? 1 - (shared.length / union.length) : 0;
      const missingPenalty = bothAnswered ? 0 : eitherAnswered ? 1.2 : 0;
      const oldBoost = q.kind === 'oldways' ? 0.6 : 0;
      const score = bothAnswered ? (scaleDiff*1.35 + priorityDiff*1.1 + choiceMismatch*3 + Math.max(aPri,bPri)*0.45 + oldBoost) : missingPenalty;
      return { question: q, a, b, aScale, bScale, aPri, bPri, scaleDiff, priorityDiff, choiceMismatch, sharedChoices: shared, onlyA, onlyB, union, bothAnswered, eitherAnswered, maxPriority: Math.max(aPri,bPri), score };
    }
    function unique(arr) { return Array.from(new Set((arr||[]).filter(Boolean))); }

    function renderTypeSummary(metrics) {
      const rows = metrics.rows.filter(r => r.bothAnswered);
      const strictA = rows.filter(r => r.aScale > r.bScale && r.scaleDiff >= 2).length;
      const strictB = rows.filter(r => r.bScale > r.aScale && r.scaleDiff >= 2).length;
      const highOld = rows.filter(r => r.question.kind === 'oldways' && r.maxPriority >= 3).length;
      const valueA = state.people.a.values || [], valueB = state.people.b.values || [];
      const sharedValues = VALUES.filter(v => valueA.includes(v.id) && valueB.includes(v.id)).map(v=>v.label);
      let title = 'まだ診断待ち';
      let desc = '回答が増えると、夫婦の傾向をここに表示します。';
      if (rows.length) {
        if (strictA > strictB + 4) { title = `${personName('a')}が細部ルール化派`; desc = `${personName('a')}の方が、具体ルールやNGを明確にしたい項目が多めです。${personName('b')}がどこなら合わせやすいかを話すと進みます。`; }
        else if (strictB > strictA + 4) { title = `${personName('b')}が細部ルール化派`; desc = `${personName('b')}の方が、具体ルールやNGを明確にしたい項目が多めです。${personName('a')}がどこなら合わせやすいかを話すと進みます。`; }
        else if (metrics.needTalk <= Math.max(5, rows.length * 0.12)) { title = '大枠一致・細部確認型'; desc = '大きな方向性は近そうです。祖父母へ伝えるNGや例外条件を決めると実用的なしおりになります。'; }
        else { title = '大枠は対話で調整型'; desc = '複数領域で希望の違いがあります。Top20から順に、守るライン・任せるライン・祖父母に伝えるラインを分けると整理しやすいです。'; }
      }
      return `<div class="type-card" style="margin-top:14px;"><h3>${esc(title)}</h3><p>${esc(desc)}</p><p class="small"><strong>共通価値観：</strong>${sharedValues.length ? sharedValues.map(esc).join('、') : '未選択または重なりなし'}　/　<strong>昔との違いで明記候補：</strong>${highOld}項目</p></div>`;
    }

    function renderComparisonTable(rows) {
      if (!rows.length) return '<p class="muted">表示できる項目がありません。</p>';
      return `<div class="table-wrap"><table><thead><tr><th>優先</th><th>項目</th><th>${esc(personName('a'))}</th><th>${esc(personName('b'))}</th><th>具体差分</th><th>メモ</th></tr></thead><tbody>
        ${rows.map(r => `
          <tr>
            <td>${renderStatus(r)}<br><span class="tiny muted">${r.score.toFixed(1)}</span></td>
            <td><strong>${esc(r.question.title)}</strong><br><span class="tiny muted">${esc(SECTION_META[r.question.section]?.short || r.question.section)} / ${esc(r.question.group)}</span>${r.question.kind==='oldways' ? `<br><span class="tiny muted">昔：${esc(r.question.oldPractice)}</span><br><span class="tiny muted">今：${esc(r.question.currentNote)}</span>` : ''}</td>
            <td>${answerSummary(r.a, r.question)} </td>
            <td>${answerSummary(r.b, r.question)} </td>
            <td>${diffSummary(r)}</td>
            <td><strong>A:</strong> ${esc(r.a.note || '-')}<br><strong>B:</strong> ${esc(r.b.note || '-')}</td>
          </tr>`).join('')}
      </tbody></table></div>`;
    }
    function renderStatus(r) {
      if (!r.eitherAnswered) return '<span class="status blank">未回答</span>';
      if (!r.bothAnswered) return '<span class="status watch">片方のみ</span>';
      if (r.maxPriority >= 4 || (r.question.kind === 'oldways' && r.maxPriority >= 3)) return '<span class="status rule">しおり候補</span>';
      if (r.score >= 4 || r.scaleDiff >= 2 || r.priorityDiff >= 2 || r.choiceMismatch >= .7) return '<span class="status talk">要相談</span>';
      if (r.score >= 2) return '<span class="status watch">確認</span>';
      return '<span class="status ok">概ね一致</span>';
    }
    function scaleLabel(q, val) { return val ? `${val}. ${q.scaleOptions?.[Number(val)-1] || DEFAULT_SCALE[Number(val)-1] || ''}` : '未選択'; }
    function priorityLabel(val) { return (PRIORITY.find(p => String(p.value) === String(val)) || PRIORITY[0]).label; }
    function answerSummary(ans, q) {
      const choices = unique([...(ans.choices||[]), ...(ans.customChoices||[])]);
      return `<div><strong>こだわり：</strong>${esc(scaleLabel(q, ans.scale))}</div><div><strong>${q.kind==='oldways' ? '気にする度' : '重要度'}：</strong>${esc(priorityLabel(ans.priority))}</div>${choices.length ? `<div class="pill-list">${choices.slice(0,5).map(c=>`<span class="pill">${esc(c)}</span>`).join('')}${choices.length>5?`<span class="pill">+${choices.length-5}</span>`:''}</div>` : '<span class="muted tiny">具体選択なし</span>'}`;
    }
    function diffSummary(r) {
      const shared = r.sharedChoices.map(c=>`<span class="pill shared">共通：${esc(c)}</span>`).join('');
      const onlyA = r.onlyA.map(c=>`<span class="pill only-a">Aのみ：${esc(c)}</span>`).join('');
      const onlyB = r.onlyB.map(c=>`<span class="pill only-b">Bのみ：${esc(c)}</span>`).join('');
      const parts = [];
      if (r.scaleDiff) parts.push(`こだわり差 ${r.scaleDiff}`);
      if (r.priorityDiff) parts.push(`重要度差 ${r.priorityDiff}`);
      if (r.union.length) parts.push(`選択肢一致 ${r.sharedChoices.length}/${r.union.length}`);
      return `<div class="tiny muted">${parts.join(' / ') || '差分少なめ'}</div><div class="pill-list">${shared + onlyA + onlyB || '<span class="muted tiny">具体選択なし</span>'}</div>`;
    }
    function renderAgreementList(rows) {
      return `<div class="grid two">${rows.map(r => `<div class="metric-card"><strong>${esc(r.question.title)}</strong><br><span class="muted tiny">${esc(SECTION_META[r.question.section]?.short || r.question.section)} / ${esc(r.question.group)}</span><div class="pill-list" style="margin-top:8px;">${r.sharedChoices.map(c => `<span class="pill shared">${esc(c)}</span>`).join('')}</div></div>`).join('')}</div>`;
    }

    function renderGuide() {
      const guideText = buildGuideText();
      $('#tab-guide').innerHTML = `
        <section class="panel">
          <h2>両家の親向けしおり文案</h2>
          <p class="muted small">比較結果から、祖父母に渡しやすい文案を自動生成します。必要に応じてコピーして編集してください。</p>
          <div class="btn-row no-print" style="margin-bottom:12px;"><button class="btn primary" data-action="copy-guide">しおり文案をコピー</button><button class="btn secondary" data-action="download-guide-text">テキストで保存</button><button class="btn dark" data-action="print">印刷 / PDF保存</button></div>
          <div class="guide-output" id="guideOutput">${esc(guideText)}</div>
        </section>
        <section class="panel soft">
          <h2>編集メモ</h2>
          <p class="muted small">しおりは「禁止リスト」だけにすると角が立ちやすいので、最初に感謝、次にお願い、最後に安全・医療・食事・写真などの明確なルールを書く構成にしています。</p>
        </section>`;
    }

    function buildGuideText() {
      const title = state.meta.familyName || '両家の親へのお願いしおり';
      const child = state.meta.childName ? `対象：${state.meta.childName}
` : '';
      const period = state.meta.period ? `重点期間：${state.meta.period}
` : '';
      const rows = buildMetrics().rows;
      const high = rows.filter(r => r.question.section === 'grandparents' && (r.maxPriority >= 3 || r.score >= 3)).sort((a,b)=>b.score-a.score).slice(0, 16);
      const oldHigh = rows.filter(r => r.question.kind === 'oldways' && (r.maxPriority >= 3 || r.score >= 3)).sort((a,b)=>b.score-a.score).slice(0, 18);
      const sharedVals = VALUES.filter(v => (state.people.a.values||[]).includes(v.id) && (state.people.b.values||[]).includes(v.id)).map(v=>v.label);
      const lines = [];
      lines.push(`${title}`);
      lines.push('');
      lines.push(child + period + `作成日：${state.meta.date || today()}`);
      lines.push('');
      lines.push('いつも私たち家族を気にかけてくれてありがとうございます。これからも安心して助けてもらえるように、夫婦で話し合った「お願い」と「守りたいこと」をまとめました。昔と今で育児の情報が違うこともあるので、戸惑う点があれば責め合うのではなく、都度一緒に確認させてください。');
      lines.push('');
      lines.push('1. 私たちが大事にしたいこと');
      lines.push(sharedVals.length ? `- 特に大事にしたい価値観：${sharedVals.join('、')}` : '- 安全・健康、子どもの気持ち、夫婦で決めた方針を大切にします。');
      lines.push('- 医療・安全・食事に関わることは、経験談だけでなく、医師・自治体・公的情報も確認して決めます。');
      lines.push('- 手伝ってもらえること自体はとてもありがたいです。そのうえで、子どもを安全に守るためのルールは一緒に守ってもらえると助かります。');
      lines.push('');
      lines.push('2. 手伝い・訪問のお願い');
      const gpHelp = high.filter(r => ['gp_help_timing','gp_help_scope','gp_visit_notice','gp_stay_length','gp_postpartum_support','gp_contact_channels'].includes(r.question.id));
      if (gpHelp.length) gpHelp.forEach(r => lines.push(formatGuideLine(r)));
      else lines.push('- 訪問や手伝いが必要な時は、こちらから相談します。急な訪問や長時間滞在は、体調や生活リズムに合わせて調整させてください。');
      lines.push('');
      lines.push('3. 子どもへの接し方・食事・写真');
      const gpChild = high.filter(r => !['gp_help_timing','gp_help_scope','gp_visit_notice','gp_stay_length','gp_postpartum_support','gp_contact_channels'].includes(r.question.id));
      if (gpChild.length) gpChild.forEach(r => lines.push(formatGuideLine(r)));
      else lines.push('- 食べ物、写真、外出、叱り方などは、夫婦で決めた方針を事前に共有します。迷ったらその場で確認してください。');
      lines.push('');
      lines.push('4. 昔とは違う育児で、特に守りたいこと');
      if (oldHigh.length) oldHigh.forEach(r => lines.push(formatOldGuideLine(r)));
      else lines.push('- 寝かせ方、食べ物、車移動、体調不良時の対応などは、最新情報を確認して夫婦で決めます。');
      lines.push('');
      lines.push('5. 困った時・迷った時');
      lines.push('- 判断に迷う時は、自己判断で進める前に親へ連絡してください。');
      lines.push('- 発熱、けが、誤飲、アレルギー症状など緊急性がありそうな時は、親へ連絡しつつ、必要に応じて救急・医療相談・受診を優先してください。');
      lines.push('- ルールを変えたい時や困ることがあれば、遠慮なく話してください。月齢や状況に応じて更新します。');
      lines.push('');
      lines.push('これからも、子どもにとって安心できる家族チームでいられるように、どうぞよろしくお願いします。');
      return lines.join('\n');
    }
    function formatGuideLine(r) {
      const choices = unique([...r.sharedChoices, ...r.onlyA, ...r.onlyB]).slice(0,4);
      const note = [r.a.note, r.b.note].filter(Boolean).join(' / ');
      return `- ${r.question.title}：${choices.length ? choices.join('、') : '夫婦で決めた方針を事前に共有します。'}${note ? `（補足：${note}）` : ''}`;
    }
    function formatOldGuideLine(r) {
      const choices = unique([...r.sharedChoices, ...r.onlyA, ...r.onlyB]).filter(c => !c.includes('特に気にしない')).slice(0,4);
      return `- ${r.question.title}：${r.question.currentNote}${choices.length ? ` 方針：${choices.join('、')}。` : ''}`;
    }

    function filterCards(person) {
      const term = (personFilters[person] || '').trim().toLowerCase();
      $$(`[data-card-person="${person}"]`).forEach(card => {
        card.style.display = !term || card.dataset.search.includes(term) ? '' : 'none';
      });
    }

    function collectPersonText(person) {
      const lines = [];
      lines.push(`${personName(person)}の回答`);
      allQuestions().forEach(q => {
        const ans = getAns(person, q.id);
        if (!answered(ans)) return;
        lines.push(''); lines.push(`【${SECTION_META[q.section]?.short || q.section} / ${q.group}】${q.title}`);
        lines.push(`こだわり：${scaleLabel(q, ans.scale)}`);
        lines.push(`${q.kind==='oldways' ? '気にする度' : '重要度'}：${priorityLabel(ans.priority)}`);
        const choices = unique([...(ans.choices||[]), ...(ans.customChoices||[])]);
        if (choices.length) lines.push(`具体：${choices.join(' / ')}`);
        if (ans.note) lines.push(`メモ：${ans.note}`);
      });
      return lines.join('\n');
    }

    function reportText() {
      const metrics = buildMetrics();
      const lines = ['夫婦比較レポート要約', ''];
      metrics.sectionScores.forEach(s => lines.push(`${SECTION_META[s.section]?.short || s.section}：平均差分スコア ${s.score.toFixed(1)}（${s.count}項目）`));
      lines.push('', '優先して話す項目:');
      metrics.rows.filter(r=>r.bothAnswered).sort((a,b)=>b.score-a.score).slice(0,10).forEach((r,i)=> lines.push(`${i+1}. ${r.question.title}（${SECTION_META[r.question.section]?.short} / score ${r.score.toFixed(1)}）`));
      return lines.join('\n');
    }

    function exportState() { return { ...state, exportedAt: new Date().toISOString() }; }
    function exportPerson(person) { return { type: 'person', schema: 'couple-family-alignment-v2', person, meta: state.meta, data: state.people[person], customQuestions: state.customQuestions || [], exportedAt: new Date().toISOString() }; }
    function downloadFile(filename, content, type='text/plain') {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }
    function downloadJson(filename, data) { downloadFile(filename, JSON.stringify(data, null, 2), 'application/json'); }
    function buildCsv() {
      const rows = buildMetrics().rows;
      const header = ['section','group','title','kind','A_scale','A_priority','A_choices','A_note','B_scale','B_priority','B_choices','B_note','shared_choices','A_only','B_only','score'];
      const body = rows.map(r => [
        SECTION_META[r.question.section]?.short || r.question.section, r.question.group, r.question.title, r.question.kind,
        scaleLabel(r.question, r.a.scale), priorityLabel(r.a.priority), unique([...(r.a.choices||[]), ...(r.a.customChoices||[])]).join(' / '), r.a.note || '',
        scaleLabel(r.question, r.b.scale), priorityLabel(r.b.priority), unique([...(r.b.choices||[]), ...(r.b.customChoices||[])]).join(' / '), r.b.note || '',
        r.sharedChoices.join(' / '), r.onlyA.join(' / '), r.onlyB.join(' / '), r.score.toFixed(2)
      ]);
      return '﻿' + [header, ...body].map(row => row.map(v => '"' + String(v ?? '').replace(/"/g,'""') + '"').join(',')).join('\n');
    }

    function importData(data) {
      if (!data || typeof data !== 'object') throw new Error('JSONの形式が正しくありません。');
      if (data.type === 'person' && data.person && data.data) {
        const p = data.person === 'b' ? 'b' : 'a';
        state.people[p] = { ...state.people[p], ...data.data };
        if (data.meta) state.meta = { ...state.meta, ...data.meta };
        mergeCustomQuestions(data.customQuestions || []);
        saveState(); renderAll(); toast(`${personName(p)}のJSONを読み込みました`); return;
      }
      if (data.schema === 'couple-family-alignment-v2' || data.people) {
        const base = emptyState();
        state = { ...base, ...data, meta: {...base.meta, ...(data.meta||{})}, people: {...base.people, ...(data.people||{})}, customQuestions: data.customQuestions || [] };
        saveState(); renderAll(); toast('全体JSONを読み込みました'); return;
      }
      throw new Error('対応していないJSON形式です。');
    }
    function mergeCustomQuestions(list) {
      const existing = new Set((state.customQuestions||[]).map(q=>q.id));
      (list||[]).forEach(q => { if (q && q.id && !existing.has(q.id)) state.customQuestions.push(q); });
    }

    document.addEventListener('click', async e => {
      const tabBtn = e.target.closest('[data-tab-target]');
      if (tabBtn) {
        activeTab = tabBtn.dataset.tabTarget;
        $$('.tab-btn').forEach(b => b.setAttribute('aria-selected', String(b === tabBtn)));
        $$('.tab-panel').forEach(p => p.classList.remove('active'));
        $('#tab-' + activeTab).classList.add('active');
        if (activeTab === 'report') renderReport();
        if (activeTab === 'guide') renderGuide();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      const valueBtn = e.target.closest('[data-value-id]');
      if (valueBtn) {
        const p = valueBtn.dataset.person, id = valueBtn.dataset.valueId;
        const arr = state.people[p].values || [];
        if (arr.includes(id)) state.people[p].values = arr.filter(x => x !== id); else state.people[p].values = [...arr, id];
        saveState(); renderStart(); return;
      }
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      const target = e.target.closest('[data-action]');
      if (action === 'add-custom-choice') {
        const p = target.dataset.person, qid = target.dataset.qid;
        const input = document.querySelector(`[data-custom-choice-input="${p}|${CSS.escape(qid)}"]`);
        const val = (input?.value || '').trim();
        if (!val) return;
        const ans = getAns(p, qid); if (!ans.customChoices.includes(val)) ans.customChoices.push(val);
        input.value = ''; saveState(); renderPerson(p); toast('選択肢を追加しました'); return;
      }
      if (action === 'delete-custom-choice') {
        const p = target.dataset.person, qid = target.dataset.qid, idx = Number(target.dataset.idx);
        const ans = getAns(p, qid); ans.customChoices.splice(idx, 1);
        saveState(); renderPerson(p); return;
      }
      if (action === 'add-custom-question') {
        const section = $('#customSection').value;
        const group = $('#customGroup').value.trim() || '自由追加';
        const title = $('#customTitle').value.trim();
        const prompt = $('#customPrompt').value.trim();
        const choices = $('#customChoices').value.split(/\n+/).map(s=>s.trim()).filter(Boolean);
        if (!title) { toast('項目タイトルを入力してください'); return; }
        state.customQuestions.push({ id: 'custom_' + uid(), section, group, title, prompt, choices: [...choices, ...commonChoicesForCustom()], scaleOptions: DEFAULT_SCALE, kind: section === 'oldways' ? 'oldways' : 'custom', sources: [], oldPractice: '', currentNote: '' });
        saveState(); renderAll(); toast('項目を追加しました'); return;
      }
      if (action === 'delete-custom-question') {
        const qid = target.dataset.qid;
        if (!confirm('この追加項目を削除しますか？回答も比較対象から外れます。')) return;
        state.customQuestions = (state.customQuestions || []).filter(q => q.id !== qid);
        saveState(); renderAll(); toast('削除しました'); return;
      }
      if (action === 'download-all-json') return downloadJson(`couple-alignment-v2-${safeDate()}.json`, exportState());
      if (action === 'download-a-json') return downloadJson(`answer-a-${safeDate()}.json`, exportPerson('a'));
      if (action === 'download-b-json') return downloadJson(`answer-b-${safeDate()}.json`, exportPerson('b'));
      if (action === 'download-csv') return downloadFile(`couple-alignment-comparison-${safeDate()}.csv`, buildCsv(), 'text/csv');
      if (action === 'download-guide-text') return downloadFile(`grandparents-guide-${safeDate()}.txt`, buildGuideText(), 'text/plain');
      if (action === 'copy-guide') { await navigator.clipboard.writeText(buildGuideText()); toast('しおり文案をコピーしました'); return; }
      if (action === 'copy-report-text') { await navigator.clipboard.writeText(reportText()); toast('レポート要約をコピーしました'); return; }
      if (action === 'copy-person-text') { const p = target.dataset.person; await navigator.clipboard.writeText(collectPersonText(p)); toast('回答テキストをコピーしました'); return; }
      if (action === 'print') return window.print();
      if (action === 'reset') { if (confirm('保存済み回答をすべて消去しますか？')) { localStorage.removeItem(STORAGE_KEY); state = emptyState(); renderAll(); toast('消去しました'); } return; }
      if (action === 'import-paste') {
        try { importData(JSON.parse($('#jsonPaste').value)); $('#jsonPaste').value = ''; } catch (err) { alert(err.message); }
        return;
      }
    });

    function commonChoicesForCustom() { return ['夫婦で決めた方針を優先したい', '事前に相談したい', '祖父母にも共有したい', 'これは特に気にしない']; }

    document.addEventListener('change', e => {
      const el = e.target;
      if (el.matches('[data-answer]')) {
        const p = el.dataset.person, qid = el.dataset.qid, key = el.dataset.answer;
        const ans = getAns(p, qid);
        if (key === 'choice') {
          const val = el.value;
          if (el.checked && !ans.choices.includes(val)) ans.choices.push(val);
          if (!el.checked) ans.choices = ans.choices.filter(x => x !== val);
        } else {
          ans[key] = el.value;
        }
        saveState(); return;
      }
      if (el.id === 'jsonFile' && el.files?.[0]) {
        const reader = new FileReader();
        reader.onload = () => { try { importData(JSON.parse(reader.result)); el.value = ''; } catch (err) { alert(err.message); } };
        reader.readAsText(el.files[0]);
      }
    });

    document.addEventListener('input', e => {
      const el = e.target;
      if (el.matches('[data-meta]')) { state.meta[el.dataset.meta] = el.value; saveState(); return; }
      if (el.matches('[data-person-name]')) { state.people[el.dataset.personName].displayName = el.value; saveState(); return; }
      if (el.matches('[data-answer="note"]')) { const ans = getAns(el.dataset.person, el.dataset.qid); ans.note = el.value; saveState(); return; }
      if (el.matches('[data-filter-person]')) { const p = el.dataset.filterPerson; personFilters[p] = el.value; filterCards(p); return; }
    });

    renderAll();
  })();
  </script>
</body>
</html>
