<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>夫婦擦り合わせシート｜家事育児・子育て方針・両家しおり</title>
  <style>
    :root {
      --bg: #fff8f1;
      --panel: #ffffff;
      --panel-soft: #fffdf9;
      --ink: #2f2a26;
      --muted: #6f655d;
      --line: #eadfd3;
      --accent: #d77945;
      --accent-2: #5f8f7b;
      --accent-3: #8b6fb3;
      --warn: #c55f36;
      --good: #4d8a68;
      --shadow: 0 14px 40px rgba(78, 52, 33, .10);
      --radius: 18px;
      --radius-sm: 12px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(215, 121, 69, .16), transparent 34rem),
        radial-gradient(circle at 90% 0%, rgba(95, 143, 123, .14), transparent 30rem),
        var(--bg);
      line-height: 1.65;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: var(--accent); }

    .app-shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(234, 223, 211, .75);
      border-radius: 26px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero h1 { margin: 0 0 8px; font-size: clamp(1.55rem, 4vw, 2.4rem); letter-spacing: .01em; }
    .hero p { margin: 0; color: var(--muted); }
    .hero-badge {
      display: inline-grid;
      place-items: center;
      min-width: 132px;
      min-height: 132px;
      border-radius: 50%;
      background: linear-gradient(145deg, #fff, #ffe9d7);
      border: 1px solid #f0d5bf;
      color: var(--accent);
      font-weight: 800;
      text-align: center;
      padding: 18px;
      box-shadow: inset 0 0 0 8px rgba(255,255,255,.55);
    }

    .tabbar {
      position: sticky;
      top: 0;
      z-index: 30;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin: 18px 0;
      padding: 12px;
      background: rgba(255,248,241,.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(234, 223, 211, .75);
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(78, 52, 33, .07);
    }
    .tab-btn {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: .18s ease;
    }
    .tab-btn[aria-selected="true"] {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
      box-shadow: 0 8px 18px rgba(47,42,38,.18);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin: 16px 0;
    }
    .panel.soft { background: rgba(255,255,255,.72); box-shadow: none; }
    .panel h2, .panel h3 { margin-top: 0; }

    .grid { display: grid; gap: 14px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    .field label, .field .label {
      display: block;
      font-size: .88rem;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fffdfb;
      color: var(--ink);
      outline: none;
    }
    textarea { min-height: 78px; resize: vertical; }
    input:focus, select:focus, textarea:focus { border-color: rgba(215,121,69,.7); box-shadow: 0 0 0 4px rgba(215,121,69,.11); }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 15px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: .16s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(78,52,33,.08); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.secondary { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
    .btn.dark { background: var(--ink); border-color: var(--ink); color: #fff; }
    .btn.danger { background: #fff4ef; border-color: #efc4ae; color: #a74824; }
    .btn.small { padding: 7px 11px; font-size: .88rem; }

    .notice {
      border-radius: 16px;
      border: 1px solid #ecd8be;
      background: #fff8ed;
      padding: 14px 16px;
      color: #6e4c29;
    }
    .notice.green { border-color: #cfe3d8; background: #f2fbf6; color: #335d49; }
    .notice.purple { border-color: #dbd0ea; background: #f8f4ff; color: #574274; }
    .muted { color: var(--muted); }
    .small { font-size: .9rem; }
    .tiny { font-size: .78rem; }
    .divider { height: 1px; background: var(--line); margin: 18px 0; }

    .progress-wrap { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .progress-pill {
      border: 1px solid var(--line);
      background: #fffdfb;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .progress-bar {
      flex: 1 1 180px;
      min-width: 160px;
      height: 12px;
      border-radius: 999px;
      background: #efe4da;
      overflow: hidden;
    }
    .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); width: 0%; transition: width .2s ease; }

    .section-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0 10px;
    }
    .section-head h3 { margin: 0; }
    .section-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff2e8;
      color: #9b552f;
      border: 1px solid #f0d6c3;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: 800;
      font-size: .86rem;
    }

    .question-card {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin: 12px 0;
    }
    .question-card header {
      display: flex;
      gap: 12px;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .question-card h4 { margin: 0; font-size: 1.05rem; }
    .question-card p { margin: 4px 0 0; color: var(--muted); font-size: .92rem; }
    .q-tag {
      flex: 0 0 auto;
      font-weight: 800;
      color: #7d5c3d;
      background: #fff4e8;
      border: 1px solid #f0dcc9;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: .75rem;
    }
    .option-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0 12px;
    }
    .choice-pill {
      min-height: 74px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      padding: 9px 8px;
      text-align: left;
      font-weight: 750;
      font-size: .86rem;
      line-height: 1.35;
      transition: .15s ease;
    }
    .choice-pill:hover { border-color: rgba(215,121,69,.65); transform: translateY(-1px); }
    .choice-pill.selected {
      background: #2f2a26;
      color: #fff;
      border-color: #2f2a26;
      box-shadow: 0 10px 22px rgba(47,42,38,.14);
    }
    .choice-index {
      display: inline-grid;
      place-items: center;
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: rgba(215,121,69,.12);
      color: var(--accent);
      font-size: .78rem;
      margin-right: 5px;
    }
    .choice-pill.selected .choice-index { background: rgba(255,255,255,.18); color: #fff; }
    .q-bottom { display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 10px; align-items: start; }

    .values-grid { display: flex; flex-wrap: wrap; gap: 9px; }
    .value-chip {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
    }
    .value-chip.selected { background: var(--accent-3); border-color: var(--accent-3); color: #fff; }

    .summary-cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .metric-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdfb;
      padding: 14px;
    }
    .metric-card .num { font-size: 1.8rem; font-weight: 900; line-height: 1; margin: 4px 0; }
    .metric-card .label { font-weight: 800; color: var(--muted); font-size: .86rem; }

    .type-card {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid #e3d7c9;
      background: linear-gradient(135deg, #fffdfb, #fff1e7);
    }
    .type-card h3 { margin: 0 0 6px; }

    .bars { display: grid; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 160px minmax(0,1fr) 86px; gap: 10px; align-items: center; }
    .bar-bg { height: 12px; background: #efe4da; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }

    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: .86rem; background: #fff9f4; position: sticky; top: 71px; z-index: 5; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 16px; background: #fff; }
    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: .78rem;
      font-weight: 900;
      white-space: nowrap;
    }
    .status.ok { background: #ecf8f1; color: #367755; }
    .status.watch { background: #fff7df; color: #8a6224; }
    .status.talk { background: #fff1ea; color: #a34d27; }
    .status.rule { background: #f7ecff; color: #684092; }
    .status.blank { background: #f2eee9; color: #746961; }

    .guide-output {
      white-space: pre-wrap;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fffdfb;
      padding: 18px;
      min-height: 240px;
      line-height: 1.8;
    }
    .text-output {
      width: 100%;
      min-height: 300px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: .9rem;
      background: #fffdfb;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 36px));
      background: #2f2a26;
      color: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 12px 36px rgba(0,0,0,.22);
      transform: translateY(120%);
      opacity: 0;
      transition: .2s ease;
      z-index: 100;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .footer-note { text-align: center; color: var(--muted); margin: 32px 0 12px; font-size: .86rem; }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; }
      .hero-badge { display: none; }
      .grid.two, .grid.three, .grid.four, .summary-cards { grid-template-columns: 1fr; }
      .option-grid { grid-template-columns: 1fr; }
      .q-bottom { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 1fr; gap: 4px; }
      th { position: static; }
      .app-shell { padding: 14px; }
    }

    @media print {
      body { background: #fff; }
      .tabbar, .btn-row, .hero-badge, .no-print, .toast { display: none !important; }
      .app-shell { max-width: none; padding: 0; }
      .hero, .panel { box-shadow: none; border-color: #ddd; page-break-inside: avoid; }
      .tab-panel { display: block !important; }
      #tab-a, #tab-b, #tab-start { display: none !important; }
      th { position: static; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <section class="hero">
      <div>
        <h1>夫婦擦り合わせシート</h1>
        <p>家事育児のこだわり、子育て方針、両家の親向けしおりを、心理テスト風に選んで比較できます。</p>
      </div>
      <div class="hero-badge">回答<br>比較<br>しおり</div>
    </section>

    <nav class="tabbar no-print" aria-label="画面切り替え">
      <button class="tab-btn" data-tab-target="start" aria-selected="true">使い方・基本情報</button>
      <button class="tab-btn" data-tab-target="a" aria-selected="false">回答A</button>
      <button class="tab-btn" data-tab-target="b" aria-selected="false">回答B</button>
      <button class="tab-btn" data-tab-target="report" aria-selected="false">夫婦比較レポート</button>
      <button class="tab-btn" data-tab-target="guide" aria-selected="false">両家しおり文案</button>
    </nav>

    <main>
      <section id="tab-start" class="tab-panel active"></section>
      <section id="tab-a" class="tab-panel"></section>
      <section id="tab-b" class="tab-panel"></section>
      <section id="tab-report" class="tab-panel"></section>
      <section id="tab-guide" class="tab-panel"></section>
    </main>

    <p class="footer-note">このHTMLは端末内だけで動きます。回答はブラウザのローカル保存を使います。共有したい時はJSONで書き出してください。</p>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
  (() => {
    const STORAGE_KEY = 'couple-family-alignment-v1';

    const SECTION_META = {
      housework: { label: '家事・育児こだわり仕分け', icon: '🧺', short: '家事育児' },
      parenting: { label: '子育て方針策定', icon: '🧭', short: '子育て方針' },
      grandparents: { label: '両家の親向けしおり', icon: '📘', short: '両家しおり' }
    };

    const DEFAULT_OPTIONS = [
      '相手流でOK・任せたい',
      '大枠が合えばOK',
      '事前に相談して決めたい',
      'やり方に強い希望がある',
      'NGあり・ルール化したい'
    ];

    const IMPORTANCE = [
      { value: 0, label: '未選択' },
      { value: 1, label: '低：気にならない' },
      { value: 2, label: '中：話せばOK' },
      { value: 3, label: '高：守りたい' },
      { value: 4, label: '最重要：NGあり' }
    ];

    const VALUES = [
      { id: 'safety', label: '安全・健康' },
      { id: 'rhythm', label: '生活リズム' },
      { id: 'autonomy', label: '自立心' },
      { id: 'kindness', label: '思いやり' },
      { id: 'curiosity', label: '好奇心' },
      { id: 'manners', label: '礼儀・約束' },
      { id: 'dialogue', label: '対話' },
      { id: 'play', label: '遊び・体験' },
      { id: 'learning', label: '学び' },
      { id: 'creativity', label: '創造性' },
      { id: 'resilience', label: '粘り強さ' },
      { id: 'family_time', label: '家族時間' },
      { id: 'diversity', label: '多様性' },
      { id: 'emotion', label: '感情の受容' },
      { id: 'community', label: '祖父母・地域との関わり' }
    ];

    const Q = [
      // 家事・育児こだわり仕分け
      { id: 'laundry', section: 'housework', title: '洗濯・干し方・畳み方', prompt: '洗剤、乾燥、畳み方、子ども服の扱いなど。' },
      { id: 'kitchen_reset', section: 'housework', title: '食器洗い・キッチンリセット', prompt: '洗うタイミング、シンク・コンロのきれいさ、翌朝に残してよい範囲。' },
      { id: 'cleanliness', section: 'housework', title: '掃除・衛生基準', prompt: '床、風呂、トイレ、赤ちゃんスペース、消毒の度合い。' },
      { id: 'meals', section: 'housework', title: '食事づくり・献立', prompt: '手作り/惣菜/外食、栄養、時短、作り置きの考え方。' },
      { id: 'shopping_stock', section: 'housework', title: '買い物・日用品補充', prompt: '在庫管理、買い方、ブランド指定、ストック量。' },
      { id: 'trash', section: 'housework', title: 'ゴミ出し・資源ごみ', prompt: '分別、収集日の管理、ゴミ箱の清潔さ。' },
      { id: 'baby_items', section: 'housework', title: '育児グッズ管理', prompt: 'おむつ、ミルク、薬、保湿剤、着替えの置き場所と補充。' },
      { id: 'bath', section: 'housework', title: '沐浴・入浴', prompt: '温度、時間、保湿、耳・爪など細かなケア。' },
      { id: 'feeding', section: 'housework', title: '授乳・ミルク・離乳食', prompt: '量、時間、衛生、初めての食材、母乳/ミルクへの考え。' },
      { id: 'sleep', section: 'housework', title: '寝かしつけ・睡眠環境', prompt: '寝る時間、泣いた時の対応、寝具、安全、寝室の分担。' },
      { id: 'diaper_toilet', section: 'housework', title: 'おむつ・トイレ・清潔', prompt: '替える頻度、おしりケア、トイトレ、外出先での衛生。' },
      { id: 'doctor', section: 'housework', title: '体調不良・受診判断', prompt: '発熱、咳、けが、薬、病院へ行く基準。' },
      { id: 'outing_safety', section: 'housework', title: '外出・交通安全', prompt: '抱っこひも、ベビーカー、チャイルドシート、手つなぎ、迷子対策。' },
      { id: 'photo_sns', section: 'housework', title: '写真・動画・SNS共有', prompt: '撮影、家族への送付、SNS、顔出し、位置情報。' },
      { id: 'toys_media', section: 'housework', title: 'おもちゃ・本・動画', prompt: '買い与え方、片付け、テレビ/動画、キャラクターもの。' },
      { id: 'crying_discipline', section: 'housework', title: '叱り方・泣いた時の対応', prompt: '声の大きさ、抱っこ、見守り、言葉選び、感情の受け止め。' },

      // 子育て方針策定
      { id: 'parenting_autonomy', section: 'parenting', title: '自立とサポートのバランス', prompt: '困った時、どこまで手伝うか。', options: ['手助け多め', '困る前に助ける', '中間', '見守って挑戦', 'かなり自立重視'] },
      { id: 'parenting_rhythm', section: 'parenting', title: '生活リズムの固定度', prompt: '睡眠、食事、外出、イベント時の柔軟性。', options: ['かなり柔軟', '基本は柔軟', '中間', 'リズム重視', 'かなり固定'] },
      { id: 'parenting_safety', section: 'parenting', title: '挑戦と安全のバランス', prompt: '公園、運動、冒険、けがのリスクへの考え方。', options: ['経験を強く優先', '多少の危険は許容', '中間', '安全を重視', 'かなり慎重'] },
      { id: 'parenting_learning', section: 'parenting', title: '学び・習い事・自由遊び', prompt: '早期教育、習い事、自由遊び、親の関わり方。', options: ['自由遊び中心', '体験中心', '中間', '学びも計画', '学びを強く重視'] },
      { id: 'parenting_discipline', section: 'parenting', title: '叱る・注意する基準', prompt: 'どこまで一貫したルールにするか。', options: ['状況で柔軟', '気持ち優先', '中間', '一貫性重視', '明確なルール重視'] },

    const $ = (sel, root = document) => root.querySelector(sel);

    function defaultState() {
      return {
        meta: {
          familyName: '',
          childName: '',
          period: '',
          memo: '',
          nameA: 'パートナーA',
          nameB: 'パートナーB'
        },
        people: {
          a: { values: [], answers: {} },
          b: { values: [], answers: {} }
        },
        updatedAt: new Date().toISOString()
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        return normalizeState(parsed);
      } catch (e) {
        return defaultState();
      }
    }

    function normalizeState(data) {
      const base = defaultState();
      const merged = {
        meta: { ...base.meta, ...(data && data.meta ? data.meta : {}) },
        people: {
          a: {
            values: Array.isArray(data?.people?.a?.values) ? data.people.a.values : [],
            answers: data?.people?.a?.answers || {}
          },
          b: {
            values: Array.isArray(data?.people?.b?.values) ? data.people.b.values : [],
            answers: data?.people?.b?.answers || {}
          }
        },
        updatedAt: data?.updatedAt || new Date().toISOString()
      };
      for (const person of ['a', 'b']) {
        for (const q of Q) {
          const ans = merged.people[person].answers[q.id] || {};
          merged.people[person].answers[q.id] = {
            choice: numberOrNull(ans.choice),
            importance: Number.isFinite(Number(ans.importance)) ? Number(ans.importance) : 0,
            note: typeof ans.note === 'string' ? ans.note : ''
          };
        }
        merged.people[person].values = merged.people[person].values.filter(v => VALUES.some(x => x.id === v)).slice(0, 5);
      }
      return merged;
    }

    function numberOrNull(v) {
      const n = Number(v);
      return Number.isFinite(n) && n > 0 ? n : null;
    }

    function save() {
      state.updatedAt = new Date().toISOString();
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) { /* ignore */ }
    }

    function esc(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function personName(key) {
      return key === 'a' ? (state.meta.nameA || 'パートナーA') : (state.meta.nameB || 'パートナーB');
    }

    function getAnswer(person, qid) {
      if (!state.people[person].answers[qid]) {
        state.people[person].answers[qid] = { choice: null, importance: 0, note: '' };
      }
      return state.people[person].answers[qid];
    }

    function optionLabel(q, choice) {
      if (!choice) return '未回答';
      const options = q.options || DEFAULT_OPTIONS;
      return options[choice - 1] || '未回答';
    }

    function importanceLabel(v) {
      return IMPORTANCE.find(x => x.value === Number(v))?.label || '未選択';
    }

            ${VALUES.map(v => `<button type="button" class="value-chip ${state.people[person].values.includes(v.id) ? 'selected' : ''}" data-value="${esc(v.id)}">${esc(v.label)}</button>`).join('')}

    function groupBySection(items) {
      return items.reduce((acc, item) => {
        if (!acc[item.section]) acc[item.section] = [];
        acc[item.section].push(item);
        return acc;
      }, {});
    }

    function renderQuestionSection(person, section, items) {
      const meta = SECTION_META[section];
      return `
        <section class="panel">
          <div class="section-head">
            <h3>${meta.icon} ${esc(meta.label)}</h3>
            <span class="section-chip">${items.length}項目</span>
          </div>
          ${items.map(q => renderQuestionCard(person, q)).join('')}
        </section>
      `;
    }

    function renderQuestionCard(person, q) {
      const ans = getAnswer(person, q.id);
      const options = q.options || DEFAULT_OPTIONS;
      return `
        <article class="question-card" data-card-person="${person}" data-card-question="${esc(q.id)}">
          <header>
            <div>
              <h4>${esc(q.title)}</h4>

            <span class="q-tag">${esc(SECTION_META[q.section].short)}</span>
          </header>
          <div class="option-grid" data-choice-group="${person}:${esc(q.id)}">
            ${options.map((opt, idx) => `
              <button type="button" class="choice-pill ${ans.choice === idx + 1 ? 'selected' : ''}" data-person="${person}" data-question="${esc(q.id)}" data-choice="${idx + 1}">
                <span class="choice-index">${idx + 1}</span>${esc(opt)}
              </button>
            `).join('')}
          </div>
          <div class="q-bottom">
            <div class="field">
              <label>重要度</label>
              <select class="importance-select" data-person="${person}" data-question="${esc(q.id)}">
                ${IMPORTANCE.map(i => `<option value="${i.value}" ${Number(ans.importance) === i.value ? 'selected' : ''}>${esc(i.label)}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>補足メモ・具体例</label>
              <textarea class="note-input" data-person="${person}" data-question="${esc(q.id)}" placeholder="例：これは絶対NG、ここは相手に任せたい、親に伝える時はこう言いたい等">${esc(ans.note)}</textarea>
            </div>
          </div>
        </article>
      `;
    }

    function calcProgress(person) {
      const total = Q.length;
      const answered = Q.filter(q => Boolean(getAnswer(person, q.id).choice)).length;
      const percent = total ? Math.round(answered / total * 100) : 0;
      return { total, answered, percent };
    }

    function updateProgressBadges() {
      for (const person of ['a', 'b']) {
        const p = calcProgress(person);
        $$(`[data-progress-pill="${person}"]`).forEach(el => el.textContent = `${p.answered}/${p.total} 回答済み`);
        $$(`[data-progress-bar="${person}"]`).forEach(el => el.style.width = `${p.percent}%`);
      }
    }

    function compareQuestion(q) {
      const a = getAnswer('a', q.id);
      const b = getAnswer('b', q.id);
      const both = Boolean(a.choice && b.choice);
      const diff = both ? Math.abs(a.choice - b.choice) : null;
      const maxImp = Math.max(Number(a.importance) || 0, Number(b.importance) || 0);
      const minImp = Math.min(Number(a.importance) || 0, Number(b.importance) || 0);
      const importanceGap = Math.abs((Number(a.importance) || 0) - (Number(b.importance) || 0));
      let score = 0;
      if (!both) score = 0;
      else {
        score = diff * 2 + maxImp + importanceGap;
        if (diff >= 2 && maxImp >= 3) score += 4;
        if (diff >= 3) score += 2;
        if (maxImp === 4) score += 1;
      }
      let status = 'blank';
      let statusLabel = '未回答あり';
      if (both) {
        if (score >= 11) { status = 'rule'; statusLabel = 'ルール化候補'; }
        else if (score >= 8) { status = 'talk'; statusLabel = '要話し合い'; }
        else if (score >= 5) { status = 'watch'; statusLabel = '確認'; }
        else { status = 'ok'; statusLabel = '近い'; }
      }
      return { q, a, b, both, diff, maxImp, minImp, importanceGap, score, status, statusLabel };
    }

    function allComparisons() {
      return Q.map(compareQuestion).sort((x, y) => y.score - x.score || (y.maxImp - x.maxImp));
    }

    function calcReportMetrics() {
      const comps = allComparisons();
      const answeredBoth = comps.filter(c => c.both).length;
      const high = comps.filter(c => c.status === 'rule' || c.status === 'talk').length;
      const rules = comps.filter(c => c.status === 'rule').length;
      const avgDiff = answeredBoth ? (comps.filter(c => c.both).reduce((sum, c) => sum + c.diff, 0) / answeredBoth) : 0;
      const categories = Object.keys(SECTION_META).map(section => {
        const list = comps.filter(c => c.q.section === section);
        const both = list.filter(c => c.both);
        const avg = both.length ? both.reduce((sum, c) => sum + c.diff, 0) / both.length : 0;
        const risk = list.filter(c => c.status === 'rule' || c.status === 'talk').length;
        return { section, label: SECTION_META[section].label, count: list.length, answered: both.length, avg, risk };
      });
      return { comps, answeredBoth, total: Q.length, high, rules, avgDiff, categories };
    }

    function renderComparisonTable(rows) {

    function compareValues() {
      const a = state.people.a.values || [];
      const b = state.people.b.values || [];
      const label = id => VALUES.find(v => v.id === id)?.label || id;
      return {
        common: a.filter(id => b.includes(id)).map(label),
        onlyA: a.filter(id => !b.includes(id)).map(label),
        onlyB: b.filter(id => !a.includes(id)).map(label)
      };
    }

    function calcPairType(metrics, values) {
      const completion = metrics.answeredBoth / Math.max(1, metrics.total);
      if (completion < 0.35) {
        return { title: 'まずは回答を増やす準備型', body: 'まだ比較材料が少ない状態です。完璧に埋めなくてもよいので、気になる項目だけ先に回答すると話し合いを始めやすくなります。' };
      }
      if (metrics.rules >= 8) {
        return { title: 'ルール化優先型', body: '重要度が高く、選択の差も大きい項目が多めです。感覚で運用するより、NG・担当・伝え方を明文化すると安心です。' };
      }
      if (metrics.avgDiff <= 0.8 && metrics.high <= 3) {
        return { title: '近い価値観・微調整型', body: '大きな方向性は近いです。細部の「どこから相談するか」「親にどう伝えるか」を決めれば運用しやすくなります。' };
      }
      if (values.common.length >= 3 && metrics.avgDiff >= 1.4) {
        return { title: '目的一致・手段調整型', body: '大事にしたい価値観は重なっていますが、実際のやり方に差が出ています。共通目的を先に確認してから具体ルールに落とすとまとまりやすいです。' };
      }
      if (metrics.categories.find(c => c.section === 'grandparents')?.risk >= 4) {
        return { title: '両家しおり重点型', body: '親世代との関わり方で確認したい点が多そうです。夫婦の合意を先に作り、やわらかい言葉でしおり化するのがおすすめです。' };
      }
      return { title: '対話バランス型', body: '近い項目と違う項目が混在しています。優先度の高いものから順に、「守りたい理由」と「譲れる範囲」を話すと進めやすいです。' };
    }

              それぞれの親には、それぞれの実子が主担当で伝える形にすると、相手が悪者になりにくいです。

    function guideUncertainItems() {
      return Q.filter(q => q.section === 'grandparents').map(compareQuestion).filter(c => c.both && c.diff >= 2 && c.maxImp >= 3);
    }

    function buildGuideText() {
      const titleName = state.meta.childName || '赤ちゃん・子ども';
      const family = state.meta.familyName || 'わが家';
      const period = state.meta.period ? `対象時期：${state.meta.period}\n` : '';
      const lines = [];
      lines.push(`${family}｜${titleName}との関わり方のお願い`);
      lines.push('');
      if (period) lines.push(period.trim());
      lines.push('いつも気にかけてくれてありがとうございます。これから安心して頼らせてもらうために、夫婦で大切にしたいことを先に共有します。');
      lines.push('親世代の経験を否定したいわけではなく、今の生活リズム・安全基準・夫婦の方針をそろえるためのお願いです。');
      lines.push('');

      const byTheme = [
        { title: '1. 手伝ってもらう時の基本', ids: ['gp_help_timing', 'gp_help_scope', 'gp_visit', 'gp_stay'] },
        { title: '2. 育児方針・昔との違い', ids: ['gp_advice', 'gp_old_methods', 'gp_ng_response'] },
        { title: '3. 食べ物・健康・安全', ids: ['gp_food', 'gp_health'] },
        { title: '4. 写真・贈り物・家庭内の距離感', ids: ['gp_photo_share', 'gp_gifts', 'gp_couple_boundary'] }
      ];

      for (const theme of byTheme) {
        lines.push(theme.title);
        for (const id of theme.ids) {
          const q = Q.find(x => x.id === id);
          const c = compareQuestion(q);
          lines.push(`・${q.title}：${guideLineFor(c)}`);
          const aNote = c.a.note?.trim();
          const bNote = c.b.note?.trim();
          if (aNote || bNote) {
            const merged = [aNote, bNote].filter(Boolean).join(' / ');
            lines.push(`  補足：${merged}`);
          }
        }
        lines.push('');
      }

      if (state.meta.memo?.trim()) {
        lines.push('夫婦メモ');
        lines.push(state.meta.memo.trim());
        lines.push('');
      }
      lines.push('最後に：困った時はこちらから相談します。お互いに気持ちよく関われるよう、まずはこの方針でお願いします。');
      return lines.join('\n');
    }

    function guideLineFor(c) {
      if (!c.a.choice && !c.b.choice) return '未定です。夫婦で確認してから共有します。';
      if (c.both && c.diff >= 2 && c.maxImp >= 3) {
        return `夫婦で要確認です。${personName('a')}は「${optionLabel(c.q, c.a.choice)}」、${personName('b')}は「${optionLabel(c.q, c.b.choice)}」を希望しています。`;
      }
      const selected = Math.max(c.a.choice || 0, c.b.choice || 0);
      return c.q.guide?.[selected - 1] || optionLabel(c.q, selected);
    }

    function buildReportText() {
      const m = calcReportMetrics();
      const values = compareValues();
      const type = calcPairType(m, values);
      const lines = [];
      lines.push('夫婦比較レポート');

      lines.push('');
      lines.push(`両方回答済み：${m.answeredBoth}/${m.total}`);
      lines.push(`平均ズレ幅：${m.avgDiff.toFixed(1)}`);
      lines.push(`要話し合い以上：${m.high}`);
      lines.push(`ルール化候補：${m.rules}`);
      lines.push('');

      m.comps.filter(c => c.both).slice(0, 12).forEach((c, idx) => {
        lines.push(`${idx + 1}. [${c.statusLabel}] ${SECTION_META[c.q.section].short}｜${c.q.title}`);
        lines.push(`   ${personName('a')}: ${optionLabel(c.q, c.a.choice)} / ${importanceLabel(c.a.importance)}`);
        lines.push(`   ${personName('b')}: ${optionLabel(c.q, c.b.choice)} / ${importanceLabel(c.b.importance)}`);
        if (c.a.note || c.b.note) lines.push(`   メモ: ${[c.a.note, c.b.note].filter(Boolean).join(' / ')}`);
      });
      return lines.join('\n');
    }

    function buildPersonText(person) {
      const lines = [];
      lines.push(`${personName(person)}の回答`);
      lines.push('');
      const vals = state.people[person].values.map(id => VALUES.find(v => v.id === id)?.label || id);
      lines.push(`大事にしたい価値観：${vals.join('、') || '未選択'}`);
      lines.push('');
      for (const q of Q) {
        const ans = getAnswer(person, q.id);
        lines.push(`[${SECTION_META[q.section].short}] ${q.title}`);
        lines.push(`選択：${optionLabel(q, ans.choice)}`);
        lines.push(`重要度：${importanceLabel(ans.importance)}`);
        if (ans.note) lines.push(`メモ：${ans.note}`);
        lines.push('');
      }
      return lines.join('\n');
    }

    function buildCSV() {
      const headers = ['カテゴリ', '項目', `${personName('a')} 選択`, `${personName('a')} 重要度`, `${personName('a')} メモ`, `${personName('b')} 選択`, `${personName('b')} 重要度`, `${personName('b')} メモ`, '差', '状態'];
      const rows = allComparisons().map(c => [
        SECTION_META[c.q.section].label,
        c.q.title,
        optionLabel(c.q, c.a.choice),
        importanceLabel(c.a.importance),
        c.a.note || '',
        optionLabel(c.q, c.b.choice),
        importanceLabel(c.b.importance),
        c.b.note || '',
        c.diff ?? '',
        c.statusLabel
      ]);
      return [headers, ...rows].map(row => row.map(csvCell).join(',')).join('\n');
    }

    function csvCell(value) {
      const s = String(value ?? '');
      return '"' + s.replaceAll('"', '""') + '"';
    }

    function exportJSON(scope, person = null) {
      let payload;
      if (scope === 'person') {
        payload = {
          app: 'couple-family-alignment',
          version: 1,
          scope: 'person',
          personKey: person,
          personName: personName(person),
          meta: state.meta,
          data: state.people[person],
          exportedAt: new Date().toISOString()
        };
      } else {
        payload = {
          app: 'couple-family-alignment',
          version: 1,
          scope: 'all',
          data: state,
          exportedAt: new Date().toISOString()
        };
      }
      const label = scope === 'person' ? `answer-${person}-${safeDate()}` : `family-alignment-${safeDate()}`;
      downloadFile(`${label}.json`, JSON.stringify(payload, null, 2), 'application/json');
    }

    function importJSON(payload, target = 'auto') {
      if (!payload || typeof payload !== 'object') throw new Error('JSON形式が正しくありません。');
      if (payload.app === 'couple-family-alignment' && payload.scope === 'person') {
        const dest = target === 'a' || target === 'b' ? target : (payload.personKey === 'a' || payload.personKey === 'b' ? payload.personKey : 'a');
        state.people[dest] = normalizeState({ people: { [dest]: payload.data } }).people[dest];
        if (payload.personName && (!state.meta[dest === 'a' ? 'nameA' : 'nameB'] || state.meta[dest === 'a' ? 'nameA' : 'nameB'].startsWith('パートナー'))) {
          state.meta[dest === 'a' ? 'nameA' : 'nameB'] = payload.personName;
        }
      } else if (payload.app === 'couple-family-alignment' && payload.scope === 'all') {
        if (target === 'a' || target === 'b') {
          const sourcePerson = payload.data?.people?.[target] ? target : 'a';
          state.people[target] = normalizeState(payload.data).people[sourcePerson];
        } else {
          state = normalizeState(payload.data);
        }
      } else if (payload.people && payload.meta) {
        state = normalizeState(payload);
      } else {
        throw new Error('このシート用のJSONとして認識できませんでした。');
      }
      save();
      renderAll();
      showToast('JSONを読み込みました。');
    }

    function downloadFile(filename, content, type = 'text/plain') {
      const blob = new Blob([content], { type: `${type};charset=utf-8` });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function safeDate() {
      return new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        return navigator.clipboard.writeText(text);
      }
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      document.execCommand('copy');
      ta.remove();
      return Promise.resolve();
    }

    function showToast(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
    }

    function switchTab(tab) {
      currentTab = tab;
      $$('.tab-btn').forEach(btn => btn.setAttribute('aria-selected', btn.dataset.tabTarget === tab ? 'true' : 'false'));
      $$('.tab-panel').forEach(panel => panel.classList.toggle('active', panel.id === `tab-${tab}`));
      if (tab === 'report') renderReport();
      if (tab === 'guide') renderGuide();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.addEventListener('click', (e) => {
      const tabBtn = e.target.closest('[data-tab-target]');
      if (tabBtn) {
        switchTab(tabBtn.dataset.tabTarget);
        return;
      }

      const choiceBtn = e.target.closest('.choice-pill[data-person][data-question]');
      if (choiceBtn) {
        const { person, question, choice } = choiceBtn.dataset;
        const ans = getAnswer(person, question);
        ans.choice = Number(choice);
        save();
        const group = choiceBtn.closest('[data-choice-group]');
        $$('.choice-pill', group).forEach(btn => btn.classList.toggle('selected', btn === choiceBtn));
        updateProgressBadges();
        if (currentTab === 'report') renderReport();
        if (currentTab === 'guide') renderGuide();
        return;
      }

      const valueBtn = e.target.closest('.value-chip[data-value]');
      if (valueBtn) {
        const wrapper = valueBtn.closest('.values-grid');
        const person = wrapper.dataset.person;
        const value = valueBtn.dataset.value;
        const values = state.people[person].values;
        if (values.includes(value)) {
          state.people[person].values = values.filter(v => v !== value);
          valueBtn.classList.remove('selected');
        } else {
          if (values.length >= 5) {
            showToast('価値観カードは最大5つまでです。');
            return;
          }
          values.push(value);
          valueBtn.classList.add('selected');
        }
        save();
        return;
      }

      const action = e.target.closest('[data-action]');
      if (action) handleAction(action);
    });

    document.addEventListener('change', (e) => {
      const imp = e.target.closest('.importance-select[data-person][data-question]');
      if (imp) {
        const ans = getAnswer(imp.dataset.person, imp.dataset.question);
        ans.importance = Number(imp.value);
        save();
        if (currentTab === 'report') renderReport();
        if (currentTab === 'guide') renderGuide();
        return;
      }

      const fileInput = e.target.matches('input[type="file"][data-action="import-file"]') ? e.target : null;
      if (fileInput && fileInput.files?.[0]) {
        const reader = new FileReader();
        reader.onload = () => {
          try {
            importJSON(JSON.parse(reader.result), $('#importTarget')?.value || 'auto');
          } catch (err) {
            showToast(err.message || '読み込みに失敗しました。');
          } finally {
            fileInput.value = '';
          }
        };
        reader.readAsText(fileInput.files[0], 'utf-8');
      }
    });

    document.addEventListener('input', (e) => {
      const meta = e.target.closest('[data-meta]');
      if (meta) {
        state.meta[meta.dataset.meta] = meta.value;
        save();
        return;
      }
      const note = e.target.closest('.note-input[data-person][data-question]');
      if (note) {
        const ans = getAnswer(note.dataset.person, note.dataset.question);
        ans.note = note.value;
        save();
      }
    });

    function handleAction(el) {
      const action = el.dataset.action;
      const person = el.dataset.person;
      if (action === 'export-all') exportJSON('all');
      if (action === 'export-person') exportJSON('person', person);
      if (action === 'export-csv') downloadFile(`family-alignment-comparison-${safeDate()}.csv`, buildCSV(), 'text/csv');
      if (action === 'print') window.print();
      if (action === 'copy-report') copyText(buildReportText()).then(() => showToast('レポートをコピーしました。'));
      if (action === 'download-report-text') downloadFile(`family-alignment-report-${safeDate()}.txt`, buildReportText(), 'text/plain');
      if (action === 'copy-guide') copyText(buildGuideText()).then(() => showToast('しおり文案をコピーしました。'));
      if (action === 'download-guide-text') downloadFile(`grandparents-guide-${safeDate()}.txt`, buildGuideText(), 'text/plain');
      if (action === 'copy-person-text') copyText(buildPersonText(person)).then(() => showToast(`${personName(person)}の回答をコピーしました。`));
      if (action === 'clear-person') {
        if (confirm(`${personName(person)}の回答をクリアしますか？`)) {
          state.people[person] = { values: [], answers: {} };
          state = normalizeState(state);
          save();
          renderAll();
          showToast('回答をクリアしました。');
        }
      }
      if (action === 'reset-all') {
        if (confirm('すべての回答と基本情報を削除しますか？この操作は元に戻せません。')) {
          state = defaultState();
          save();
          renderAll();
          switchTab('start');
          showToast('全データを削除しました。');
        }
      }
    }

    renderAll();
  })();
  </script>
</body>
</html>
